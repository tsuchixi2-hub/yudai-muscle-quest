<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121416">
  <title>ランキング | Muscle Quest</title>
  <style>
    :root {
      color-scheme:light;
      --ink:#151719;
      --muted:#6f757c;
      --paper:#f5f6f7;
      --panel:#ffffff;
      --line:#dfe3e6;
      --coal:#202428;
      --red:#d63838;
      --green:#16885b;
      --blue:#2278b8;
      --shadow:0 10px 24px rgba(21,23,25,.08);
    }
    * { box-sizing:border-box; }
    html {
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }
    body {
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      margin:0;
      color:var(--ink);
      background:linear-gradient(180deg,#eceff1 0,#f7f7f5 300px,var(--paper) 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;
    }
    button,input { font:inherit; }
    button { cursor:pointer; }
    a { color:inherit; }
    .hidden { display:none !important; }
    .app { width:min(1040px,100%); margin:0 auto; padding:0 18px 80px; }
    .topbar {
      position:sticky;
      z-index:20;
      top:0;
      margin:0 -18px;
      padding:max(12px,env(safe-area-inset-top)) 18px 11px;
      border-bottom:1px solid rgba(223,227,230,.86);
      background:rgba(245,246,247,.92);
      backdrop-filter:blur(18px);
    }
    .topbar-inner { max-width:1004px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand { display:flex; align-items:center; gap:10px; min-width:0; }
    .brand-mark {
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      flex:0 0 auto;
      overflow:hidden;
    }
    .brand-mark img { width:100%; height:100%; display:block; object-fit:cover; object-position:center 44%; }
    .brand strong { display:block; font-size:15px; line-height:1.1; }
    .brand span { display:block; margin-top:4px; color:var(--muted); font-size:10px; font-weight:800; }
    .top-actions { display:flex; align-items:center; gap:8px; }
    .brand { text-decoration:none; }
    .icon-btn.menu-toggle { display:grid; }
    body.menu-open { overflow:hidden; }
    body.menu-open .topbar { z-index:60; }
    body.menu-open::before {
      content:"";
      position:fixed;
      inset:0;
      z-index:40;
      background:rgba(18,20,22,.18);
      backdrop-filter:blur(1px);
    }
    .mobile-menu {
      width:min(320px,calc(100vw - 24px));
      max-height:calc(100vh - 92px);
      margin:0;
      padding:10px;
      display:grid;
      gap:8px;
      position:fixed;
      top:calc(70px + env(safe-area-inset-top,0px));
      right:max(12px,env(safe-area-inset-right,0px));
      z-index:50;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:var(--shadow);
      opacity:0;
      pointer-events:none;
      transform:translateX(calc(100% + 24px));
      transition:transform .22s ease, opacity .22s ease;
      will-change:transform;
    }
    .mobile-menu.open {
      opacity:1;
      pointer-events:auto;
      transform:translateX(0);
    }
    .mobile-menu a,.mobile-menu button {
      min-height:42px;
      padding:0 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      border-radius:8px;
      color:var(--coal);
      background:#fff;
      font-size:12px;
      font-weight:900;
      text-decoration:none;
    }
    .mobile-menu .logout-link {
      min-height:auto;
      padding:6px 0;
      justify-content:center;
      border:0;
      color:var(--muted);
      background:transparent;
      text-align:center;
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .mobile-menu .mobile-primary {
      border:0;
      color:#fff;
      background:var(--red);
    }
    .back-link,.user-chip {
      min-height:40px;
      padding:0 13px;
      display:inline-flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      gap:3px;
      border:1px solid var(--line);
      border-radius:8px;
      color:var(--coal);
      background:#fff;
      text-decoration:none;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .user-chip-main { display:flex; align-items:center; gap:10px; line-height:1.15; }
    .user-chip-meta { color:var(--muted); font-size:10px; font-weight:900; line-height:1.15; }
    .user-chip-meta.rank-gold { color:#c89416; }
    .user-chip-meta.rank-silver { color:#8f98a3; }
    .user-chip-meta.rank-bronze { color:#a5622c; }
    .icon-btn {
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      border-radius:8px;
      color:var(--coal);
      background:#fff;
      font-weight:900;
    }
    .logout-link {
      min-height:40px;
      padding:0;
      border:0;
      color:var(--muted);
      background:transparent;
      font-size:12px;
      font-weight:900;
      text-decoration:underline;
      text-underline-offset:3px;
      white-space:nowrap;
    }
    .logout-link:hover { color:var(--coal); }
    .header-edit-link {
      min-height:auto;
      padding:0;
      border:0;
      color:var(--muted);
      background:transparent;
      font-size:11px;
      font-weight:900;
      text-decoration:underline;
      text-underline-offset:3px;
      white-space:nowrap;
    }
    .header-edit-link:hover { color:var(--coal); }
    .primary-btn {
      min-height:40px;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      border-radius:8px;
      color:#fff;
      background:var(--red);
      font-size:12px;
      font-weight:900;
      text-decoration:none;
    }
    .auth-panel,.hero,.ranking {
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:var(--shadow);
    }
    .auth-panel {
      padding:14px;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:14px;
      align-items:center;
    }
    .auth-panel h2 { margin:0; color:var(--coal); font-size:17px; }
    .auth-panel p { margin:5px 0 0; color:var(--muted); font-size:12px; line-height:1.55; }
    .auth-form { display:flex; gap:8px; align-items:center; }
    .auth-form input {
      width:180px;
      min-height:40px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:0 10px;
      background:#f9fafb;
      font-size:13px;
      font-weight:800;
    }
    .nickname-review {
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-start;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }
    .nickname-review strong {
      color:var(--coal);
      font-size:14px;
    }
    .text-link {
      padding:0;
      border:0;
      color:var(--red);
      background:transparent;
      font-size:12px;
      font-weight:900;
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .line-login-btn {
      min-height:42px;
      padding:0 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      border-radius:8px;
      color:#fff;
      background:#06c755;
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
      box-shadow:0 8px 18px rgba(6,199,85,.22);
    }
    .auth-note {
      display:block;
      margin-top:8px;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
    }
    .hero { padding:22px; }
    .kicker { color:var(--red); font-size:11px; font-weight:900; }
    h1 { margin:8px 0 0; color:var(--coal); font-size:38px; line-height:1.05; letter-spacing:0; }
    .hero p { max-width:760px; margin:12px 0 0; color:var(--muted); font-size:14px; line-height:1.75; }
    .ranking { display:grid; gap:14px; overflow:visible; }
    .ranking-section {
      display:grid;
      gap:12px;
    }
    .ranking-title {
      padding:4px 10px 0;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .ranking-title h2 {
      margin:0;
      color:var(--coal);
      font-size:18px;
      line-height:1.25;
    }
    .ranking-title p {
      margin:4px 0 0;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      line-height:1.55;
    }
    .ranking-updated {
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      text-align:right;
      white-space:nowrap;
    }
    .ranking-table {
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      box-shadow:var(--shadow);
    }
    .ranking-head,.ranking-row {
      display:grid;
      gap:10px;
      align-items:center;
      padding:13px 14px;
      border-bottom:1px solid var(--line);
    }
    .ranking-table.daily .ranking-head,
    .ranking-table.daily .ranking-row {
      grid-template-columns:58px minmax(150px,1fr) 102px 82px 96px 96px 110px 92px;
    }
    .ranking-table.weekly .ranking-head,
    .ranking-table.weekly .ranking-row {
      grid-template-columns:58px minmax(150px,1fr) 82px 96px 96px 110px 92px;
    }
    .ranking-head {
      color:var(--muted);
      background:#f8f9fa;
      font-size:11px;
      font-weight:900;
    }
    .ranking-row.current { background:#fff7f7; }
    .ranking-row:last-child { border-bottom:0; }
    .rank {
      width:38px;
      height:38px;
      display:grid;
      place-items:center;
      border-radius:8px;
      color:#fff;
      background:var(--coal);
      font-size:15px;
      font-weight:900;
    }
    .rank.top { background:var(--red); }
    .name strong { display:block; color:var(--coal); font-size:15px; }
    .name span { display:block; margin-top:4px; color:var(--muted); font-size:11px; font-weight:800; }
    .metric strong { display:block; color:var(--coal); font-size:15px; }
    .metric span { display:block; margin-top:4px; color:var(--muted); font-size:10px; font-weight:900; }
    .rank-change {
      display:inline-flex;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
    }
    .rank-change.up { color:var(--blue); }
    .rank-change.down { color:var(--red); }
    .rank-change.same { color:var(--muted); }
    .rank-change-from { margin-left:4px; color:var(--muted); }
    .empty {
      padding:34px 14px;
      color:var(--muted);
      text-align:center;
      font-size:13px;
      font-weight:900;
      line-height:1.7;
    }
    .toast {
      position:fixed;
      z-index:40;
      right:18px;
      bottom:24px;
      left:18px;
      max-width:420px;
      margin:auto;
      padding:12px 14px;
      border-radius:8px;
      color:#fff;
      background:rgba(21,23,25,.94);
      text-align:center;
      font-size:12px;
      font-weight:900;
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      transition:.18s ease;
    }
    .toast.show { opacity:1; transform:none; }
    @media (max-width:820px) {
      .ranking { overflow:auto; }
      .ranking-table.daily .ranking-head,.ranking-table.daily .ranking-row { min-width:900px; }
      .ranking-table.weekly .ranking-head,.ranking-table.weekly .ranking-row { min-width:780px; }
    }
    @media (max-width:620px) {
      .app { padding-inline:12px; }
      .topbar { margin-inline:-12px; padding-inline:12px; }
      .topbar-inner { flex-wrap:wrap; gap:8px; }
      .top-actions { margin-left:auto; }
      .icon-btn.menu-toggle { display:grid; }
      .mobile-menu { width:min(320px,calc(100vw - 24px)); }
      .top-actions .back-link { display:none; }
      .auth-panel { grid-template-columns:1fr; }
      .auth-form { flex-direction:column; align-items:stretch; }
      .auth-form input { width:100%; }
      h1 { font-size:31px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html" aria-label="ホーム">
          <div class="brand-mark" aria-hidden="true">
            <img src="assets/muscle-quest-icon-white.png" alt="">
          </div>
          <div>
            <strong>Muscle Quest</strong>
            <span>みんなで筋トレ習慣化</span>
          </div>
        </a>
        <div class="top-actions">
          <span class="user-chip" id="userChip">
            <span class="user-chip-main">
              <span id="userChipName">未ログイン</span>
              <button class="header-edit-link hidden" type="button" id="editNicknameLink">編集</button>
            </span>
            <span class="user-chip-meta hidden" id="userChipMeta"></span>
          </span>
          <button class="icon-btn menu-toggle" type="button" id="menuBtn" aria-controls="mobileMenu" aria-expanded="false" aria-label="メニュー">☰</button>
        </div>
      </div>
      <nav class="mobile-menu" id="mobileMenu" aria-label="スマホメニュー" data-menu-auth="true"></nav>
    </header>

    <section class="auth-panel" id="authPanel">
      <div>
        <h2 id="authTitle">LINEログイン</h2>
        <p id="authCopy">LINEでログイン後、ランキングに表示するニックネームを設定します。</p>
      </div>
      <div id="lineLoginStep">
        <button class="line-login-btn" type="button" id="lineLoginBtn">LINEログイン</button>
        <span class="auth-note">ローカルでは仮LINEログインとして動きます。</span>
      </div>
      <form class="auth-form hidden" id="nicknameForm">
        <input id="nicknameInput" maxlength="32" placeholder="ニックネームを入力">
        <button class="primary-btn" type="submit">設定して始める</button>
      </form>
    </section>

    <section class="hero">
      <span class="kicker">GLOBAL MUSCLE RANKING</span>
      <h1>続けた人が、上に行く。</h1>
      <p>ランキングは重量や回数だけではなく、今週の実行日、同じ部位に戻る休息リズム、連続記録を中心に見ます。</p>
    </section>

    <section class="ranking" id="ranking"></section>
  </div>
  <div class="toast" id="toast"></div>

  <script src="assets/shared-menu.js"></script>
  <script>
    (() => {
      const state = {
        currentUser:null,
        ranking:[],
        weeklyRanking:[],
        rankingUpdatedAt:"",
        needsNickname:new URLSearchParams(location.search).get("nickname") === "1",
        nicknameReview:false
      };
      const $ = id => document.getElementById(id);
      const fmt = n => Number(n || 0).toLocaleString("ja-JP");

      function toast(text) {
        const el = $("toast");
        el.textContent = text;
        el.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => el.classList.remove("show"), 1800);
      }
      function escapeHtml(text) {
        return String(text || "").replace(/[&<>"']/g, char => ({
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          "\"":"&quot;",
          "'":"&#39;"
        })[char]);
      }
      async function apiJson(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers:{
            "content-type":"application/json",
            ...(options.headers || {})
          }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const error = new Error(data.error || "api_error");
          error.status = response.status;
          throw error;
        }
        return data;
      }
      function lineDemoKey() {
        const key = localStorage.getItem("ymqLineDemoKey") || `line-${crypto.randomUUID()}`;
        localStorage.setItem("ymqLineDemoKey", key);
        return key;
      }
      function hasRegisteredNickname(user) {
        return Boolean(user?.publicName && user.publicName !== "LINEユーザー");
      }
      function currentRankingItem() {
        return state.ranking.find(item => item.isCurrent) || state.ranking.find(item => item.userId === state.currentUser?.id) || null;
      }
      function headerRankClass(item) {
        if (!item) return "";
        if (item.rank === 1) return "rank-gold";
        if (item.rank === 2) return "rank-silver";
        if (item.rank === 3) return "rank-bronze";
        return "";
      }
      function formatUpdatedAt(value) {
        if (!value) return "";
        return new Date(value).toLocaleString("ja-JP", {
          month:"2-digit",
          day:"2-digit",
          hour:"2-digit",
          minute:"2-digit"
        });
      }
      function rankChangeHtml(item) {
        const change = Number(item?.rankChange || 0);
        const pointChange = Number(item?.pointChange || 0);
        const pointLabel = `${pointChange >= 0 ? "+" : ""}${fmt(pointChange)}pt`;
        const fromRank = item?.previousRank ? `<span class="rank-change-from">from ${item.previousRank}位</span>` : `<span class="rank-change-from">new</span>`;
        if (change > 0) return `<span class="rank-change up">up↑ ${pointLabel} ${fromRank}</span>`;
        if (change < 0) return `<span class="rank-change down">down↓ ${pointLabel} ${fromRank}</span>`;
        return `<span class="rank-change same">same ${pointLabel} ${fromRank}</span>`;
      }
      function renderHeaderMeta(nicknameStep) {
        const meta = $("userChipMeta");
        const item = currentRankingItem();
        const show = Boolean(state.currentUser) && item && (!nicknameStep || hasRegisteredNickname(state.currentUser));
        meta.className = `user-chip-meta ${show ? headerRankClass(item) : "hidden"}`.trim();
        meta.textContent = show ? `Lv.${item.level} / ${fmt(item.points)}pt / ${item.rank}位` : "";
      }
      function renderAuth() {
        const loggedIn = Boolean(state.currentUser);
        const nicknameStep = loggedIn && state.needsNickname;
        const canToggleNickname = loggedIn && (!nicknameStep || hasRegisteredNickname(state.currentUser));
        $("authPanel").classList.toggle("hidden", loggedIn && !nicknameStep);
        $("lineLoginStep").classList.toggle("hidden", loggedIn);
        $("nicknameForm").classList.toggle("hidden", !nicknameStep);
        $("authTitle").textContent = nicknameStep
          ? hasRegisteredNickname(state.currentUser) ? "ニックネーム編集" : "ニックネーム設定"
          : "LINEログイン";
        $("authCopy").textContent = nicknameStep
          ? hasRegisteredNickname(state.currentUser)
            ? "ランキングに表示するニックネームを変更できます。"
            : "ランキングに表示するニックネームを設定してください。"
          : "LINEでログイン後、ランキングに表示するニックネームを設定します。";
        $("logoutBtn").classList.toggle("hidden", !loggedIn);
        $("editNicknameLink").classList.toggle("hidden", !canToggleNickname);
        $("editNicknameLink").textContent = nicknameStep ? "×とじる" : "編集";
        $("userChipName").textContent = loggedIn ? `${state.currentUser.publicName}さん` : "未ログイン";
        renderHeaderMeta(nicknameStep);
      }
      function renderRanking() {
        renderAuth();
        if (!state.currentUser) {
          $("ranking").innerHTML = `<div class="empty">仮ログインすると、登録者全体ランキングを表示します。</div>`;
          return;
        }
        if (state.needsNickname) {
          $("ranking").innerHTML = `<div class="empty">ニックネームを設定するとランキングを表示します。</div>`;
          return;
        }
        if (!state.ranking.length) {
          $("ranking").innerHTML = `<div class="empty">まだランキング対象の記録がありません。</div>`;
          return;
        }
        const updated = state.rankingUpdatedAt ? `更新 ${formatUpdatedAt(state.rankingUpdatedAt)}` : "";
        $("ranking").innerHTML = `
          ${renderRankingTable({
            title:"デイリーランキング",
            description:"記録するとリアルタイムで更新されます。変動は昨日終了時点の順位との比較です。",
            updated,
            items:state.ranking,
            mode:"daily"
          })}
          ${renderRankingTable({
            title:"週間ランキング",
            description:"今週の記録だけで見た、継続リズム重視のランキングです。",
            updated,
            items:state.weeklyRanking,
            mode:"weekly"
          })}
        `;
      }
      function renderRankingTable({ title, description, updated, items, mode }) {
        const list = Array.isArray(items) ? items : [];
        if (!list.length) {
          return `<section class="ranking-section"><div class="ranking-title"><div><h2>${title}</h2><p>${description}</p></div><span class="ranking-updated">${updated}</span></div><div class="ranking-table ${mode}"><div class="empty">まだランキング対象の記録がありません。</div></div></section>`;
        }
        const changeHead = mode === "daily" ? "<span>デイリー変動</span>" : "";
        const changeCell = item => mode === "daily" ? `<div class="metric">${rankChangeHtml(item)}<span>昨日比</span></div>` : "";
        return `
          <section class="ranking-section">
            <div class="ranking-title">
              <div>
                <h2>${title}</h2>
                <p>${description}</p>
              </div>
              <span class="ranking-updated">${updated}</span>
            </div>
            <div class="ranking-table ${mode}">
              <div class="ranking-head">
                <span>順位</span><span>ユーザー</span>${changeHead}<span>レベル</span><span>ポイント</span><span>今週</span><span>休息間隔</span><span>連続</span>
              </div>
              ${list.map(item => `
                <article class="ranking-row ${item.isCurrent ? "current" : ""}">
                  <div class="rank ${item.rank <= 3 ? "top" : ""}">${item.rank}</div>
                  <div class="name"><strong>${escapeHtml(item.publicName)}${item.isCurrent ? "（自分）" : ""}</strong><span>${item.totalLogs}件の記録</span></div>
                  ${changeCell(item)}
                  <div class="metric"><strong>Lv.${item.level}</strong><span>${escapeHtml(item.levelName)}</span></div>
                  <div class="metric"><strong>${fmt(item.points)}pt</strong><span>継続重視</span></div>
                  <div class="metric"><strong>${item.weekDone}/7日</strong><span>今週実行</span></div>
                  <div class="metric"><strong>${item.bestIntervalCount + item.okIntervalCount}件</strong><span>ベスト/許容</span></div>
                  <div class="metric"><strong>${item.streak}日</strong><span>最長連続</span></div>
                </article>
              `).join("")}
            </div>
          </section>
        `;
      }
      async function loadMe() {
        try {
          const data = await apiJson("/api/auth/me");
          state.currentUser = data.user || null;
          if (state.currentUser && state.needsNickname && hasRegisteredNickname(state.currentUser)) {
            state.needsNickname = false;
            history.replaceState(null, "", location.pathname + location.hash);
          }
          renderAuth();
          if (state.currentUser && !state.needsNickname) await loadRanking();
          else renderRanking();
        } catch {
          state.currentUser = null;
          state.nicknameReview = false;
          state.ranking = [];
          state.weeklyRanking = [];
          state.rankingUpdatedAt = "";
          renderRanking();
          toast("ログイン状態を確認できませんでした");
        }
      }
      async function loadRanking() {
        try {
          const data = await apiJson("/api/rankings");
          state.ranking = Array.isArray(data.ranking) ? data.ranking : [];
          state.weeklyRanking = Array.isArray(data.weeklyRanking) ? data.weeklyRanking : [];
          state.rankingUpdatedAt = data.updatedAt || "";
          renderRanking();
        } catch {
          state.ranking = [];
          state.weeklyRanking = [];
          state.rankingUpdatedAt = "";
          renderRanking();
          toast("ランキングを読み込めませんでした");
        }
      }
      async function beginLineLogin() {
        const btn = $("lineLoginBtn");
        btn.disabled = true;
        try {
          const start = await fetch(`/api/auth/line/start?returnTo=${encodeURIComponent(location.pathname + location.search)}`, {
            headers:{ "accept":"application/json" }
          });
          if (start.ok) {
            const data = await start.json();
            if (data.authUrl) {
              location.href = data.authUrl;
              return;
            }
          }
          const data = await apiJson("/api/auth/demo-login", {
            method:"POST",
            body:JSON.stringify({
              displayName:"LINEユーザー",
              publicName:"LINEユーザー",
              demoKey:lineDemoKey(),
              needsNickname:true
            })
          });
          state.currentUser = data.user;
          state.needsNickname = !hasRegisteredNickname(data.user);
          state.ranking = [];
          state.weeklyRanking = [];
          state.rankingUpdatedAt = "";
          $("nicknameInput").value = data.user.publicName === "LINEユーザー" ? "" : data.user.publicName;
          toast(state.needsNickname ? "LINEログインしました。ニックネームを設定してください" : "LINEログインしました");
          if (state.needsNickname) renderRanking();
          else await loadRanking();
        } catch {
          toast("LINEログインを開始できませんでした");
        } finally {
          btn.disabled = false;
        }
      }
      async function saveNickname(event) {
        event.preventDefault();
        const nickname = $("nicknameInput").value.trim();
        if (!nickname) {
          toast("ニックネームを入力してください");
          return;
        }
        const btn = event.submitter || $("nicknameForm").querySelector("button");
        btn.disabled = true;
        try {
          const data = await apiJson("/api/auth/nickname", {
            method:"POST",
            body:JSON.stringify({ nickname })
          });
          state.currentUser = data.user;
          state.needsNickname = false;
          state.nicknameReview = false;
          history.replaceState(null, "", location.pathname + location.hash);
          toast(`${data.user.publicName}で開始します`);
          await loadRanking();
        } catch {
          toast("ニックネームを設定できませんでした");
        } finally {
          btn.disabled = false;
        }
      }
      function editNickname() {
        if (!state.currentUser) return;
        if (state.needsNickname && hasRegisteredNickname(state.currentUser)) {
          state.needsNickname = false;
          renderRanking();
          return;
        }
        state.needsNickname = true;
        $("nicknameInput").value = state.currentUser.publicName === "LINEユーザー" ? "" : state.currentUser.publicName;
        renderRanking();
      }
      $("lineLoginBtn").addEventListener("click", beginLineLogin);
      $("nicknameForm").addEventListener("submit", saveNickname);
      $("editNicknameLink").addEventListener("click", editNickname);
      function closeMobileMenu() {
        $("mobileMenu").classList.remove("open");
        document.body.classList.remove("menu-open");
        $("menuBtn").setAttribute("aria-expanded", "false");
      }
      function openMobileMenu() {
        $("mobileMenu").classList.add("open");
        document.body.classList.add("menu-open");
        $("menuBtn").setAttribute("aria-expanded", "true");
      }
      $("menuBtn").addEventListener("click", event => {
        event.stopPropagation();
        const open = !$("mobileMenu").classList.contains("open");
        if (open) openMobileMenu();
        else closeMobileMenu();
      });
      document.addEventListener("click", event => {
        if (!$("mobileMenu").classList.contains("open")) return;
        if (event.target.closest("#mobileMenu") || event.target.closest("#menuBtn")) return;
        closeMobileMenu();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape") closeMobileMenu();
      });
      $("mobileMenu").addEventListener("click", event => {
        if (event.target.closest("a,button")) closeMobileMenu();
      });
      let menuTouchStartX = 0;
      let menuTouchStartY = 0;
      let menuTouchLastX = 0;
      let menuTouchLastY = 0;
      $("mobileMenu").addEventListener("touchstart", event => {
        const touch = event.touches[0];
        menuTouchStartX = touch.clientX;
        menuTouchStartY = touch.clientY;
        menuTouchLastX = touch.clientX;
        menuTouchLastY = touch.clientY;
      }, { passive:true });
      $("mobileMenu").addEventListener("touchmove", event => {
        const touch = event.touches[0];
        menuTouchLastX = touch.clientX;
        menuTouchLastY = touch.clientY;
      }, { passive:true });
      $("mobileMenu").addEventListener("touchend", () => {
        const deltaX = menuTouchLastX - menuTouchStartX;
        const deltaY = Math.abs(menuTouchLastY - menuTouchStartY);
        if (deltaX > 60 && deltaY < 80) closeMobileMenu();
      });
      setInterval(() => {
        if (state.currentUser && !state.needsNickname) loadRanking();
      }, 30000);
      $("logoutBtn").addEventListener("click", async () => {
        try {
          await apiJson("/api/auth/logout", { method:"POST", body:"{}" });
        } catch {}
        state.currentUser = null;
        state.needsNickname = false;
        state.nicknameReview = false;
        state.ranking = [];
        state.weeklyRanking = [];
        state.rankingUpdatedAt = "";
        toast("ログアウトしました");
        renderRanking();
      });
      renderRanking();
      loadMe();
    })();
  </script>
</body>
</html>
